name: Daily YouTube Digest

on:
  schedule:
    # 21:00 UTC = 05:00 Singapore time (UTC+8) the next day.
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run digest
        env:
          # Secrets (Settings > Secrets and variables > Actions > Secrets tab)
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          VIEWER_PROFILE: ${{ secrets.VIEWER_PROFILE }}
          # Variables (same screen, Variables tab) — readable and editable later, no re-typing.
          # Each falls back to a sensible default in main.py if unset.
          YOUTUBE_CHANNEL_IDS: ${{ vars.YOUTUBE_CHANNEL_IDS }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
        run: python main.py

      - name: Commit processed_videos.json
        run: |
          if [ -n "$(git status --porcelain processed_videos.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add processed_videos.json
            git commit -m "Update processed videos [skip ci]"
            git push
          else
            echo "No changes to processed_videos.json"
          fi
